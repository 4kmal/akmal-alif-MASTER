<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog - Akmal Alif</title>
      <link rel="icon" href="./icon/ig.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/blog-styles.css">
  
  <!-- Vercel Analytics & Speed Insights -->
  <script type="module" src="./js/analytics.js"></script>
  <script type="module" src="./js/speed-insights.js"></script>
  <script type="module" src="./js/profile-metrics.js"></script>
  <script src="./js/navigation-analytics.js"></script>
  <script src="./js/vercel-monitoring.js"></script>
</head>
<body class="blog-page">
    <!-- Animated Grid Background Placeholder -->
    <div id="animated-background-placeholder"></div>
    
    <!-- Site Header Placeholder -->
    <div id="site-header-placeholder"></div>

    <div class="main-container blog-page-container">
        <div class="card blog-listing-card">
            <!-- Blog Category Filter Buttons -->
            <div class="blog-category-filters" data-blog-filters></div>
            
            <header class="blog-header">
                <h1>My Blog</h1>
            </header>
            <main class="blog-posts-list" data-blog-posts></main>
            
        </div>
    </div>

    <!-- Custom Cursor -->
    <script src="./js/custom-cursor.js"></script>
    
    <!-- Music Player Modules -->
    <script type="module" src="./js/modules/musicPlayer.js"></script>
    <script type="module" src="./js/modules/playerIntegration.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/mobile-menu.js"></script> 
    <script type="module" src="./js/blog-listing.js"></script>
    <script src="./js/blog-filters.js"></script>
</body>
</html>

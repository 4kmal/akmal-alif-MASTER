<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akmal Alif - Playground</title>
    <meta name="description" content="Explore creative tools and experiments - ASCII art, glitch effects, and more">

    <!-- Icons -->
    <link rel="icon" href="../icon/ig.ico" type="image/x-icon">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Core Styles - Following existing codebase pattern -->
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Playground Specific Styles -->
    <link rel="stylesheet" href="./playground-styles.css">

    <!-- Font Preload -->
    <link rel="preload" href="../assets/fonts/press-start.ttf" as="font" type="font/ttf" crossorigin>

    <!-- Vercel Analytics & Speed Insights -->
    <script type="module" src="../js/analytics.js"></script>
    <script type="module" src="../js/speed-insights.js"></script>
    <script src="../js/navigation-analytics.js"></script>
    <script src="../js/vercel-monitoring.js"></script>
</head>

<body class="playground-page">
    <!-- Animated Background -->
    <div id="animated-background-placeholder"></div>

    <!-- Header -->
    <div id="site-header-placeholder"></div>

    <!-- Swipe Overlay for Mobile -->
    <div id="swipe-overlay"></div>

    <!-- Main Playground Content -->
    <div class="playground-wrapper awge-tube-shape">
        <!-- AWGE-Style Home Section -->


        <!-- Navigation Bar (AWGE Style) -->
        <div class="playground-navbar playground-navbar-mobile">
            <h1 class="playground-navbar-text">
                <span id="playground-navbar-text">
                    <span class="creative-letter" data-color="green">N</span>
                    <span class="creative-letter" data-color="yellow">O</span>
                    <span class="creative-letter" data-color="red">T</span>
                    <span class="creative-letter" data-color="blue">A</span>
                    <span class="creative-letter" data-color="green">K</span>
                    <span class="creative-letter" data-color="yellow">U</span>
                    <span class="creative-letter" data-color="red">:</span>
                    <span class="creative-letter" data-color="blue">D</span>
                    <span style="margin: 0 0.5rem;"></span>
                    <span class="creative-letter" data-color="green">P</span>
                    <span class="creative-letter" data-color="yellow">L</span>
                    <span class="creative-letter" data-color="red">A</span>
                    <span class="creative-letter" data-color="blue">Y</span>
                    <span class="creative-letter" data-color="green">G</span>
                    <span class="creative-letter" data-color="yellow">R</span>
                    <span class="creative-letter" data-color="red">O</span>
                    <span class="creative-letter" data-color="blue">U</span>
                    <span class="creative-letter" data-color="green">N</span>
                    <span class="creative-letter" data-color="yellow">D</span>
                </span>
            </h1>
        </div>

        <!-- Main Playground Content -->
        <div class="playground-content">
            <!-- Stars Background -->
            <div class="playground-stars"></div>

            <!-- Title Section (removed - was commented out) -->

            <!-- 3D Tools Carousel Section (AWGE-Style) -->
            <div id="playground-carousel-third" class="playground-third playground-carousel">
                <div class="playground-carousel-container">
                    <div id="playground-carousel" class="playground-carousel-carousel">
                        <!-- Tools will be dynamically inserted here -->
                    </div>
                </div>
            </div>

            <!-- Tool Info Section -->
            <div class="playground-third playground-info">
                <div class="playground-info-row">
                    <div class="playground-info-left">
                        <h1 id="playground-info-prev" class="playground-info-control">&lt;</h1>
                    </div>
                    <div class="playground-info-center">
                        <h1 id="playground-info-title" class="playground-info-title playground-text-glitch"
                            data-text=""></h1>
                        <h1 id="playground-info-description" class="playground-info-description playground-text-glitch"
                            data-text=""></h1>
                    </div>
                    <div class="playground-info-right">
                        <h1 id="playground-info-next" class="playground-info-control">&gt;</h1>
                    </div>
                </div>
                <div class="playground-info-row">
                    <div class="playground-info-center">
                        <button id="playground-launch-btn" class="playground-launch-button">
                            <span>Enter Playground</span>
                            <div class="button-glitch"></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Copyright Section -->
            <div class="playground-copyright">
                <h4 class="playground-copyright-text">© 2025 Notaku <br />
                    <span class="playground-tc">Follow your Curiosity</span>
                </h4>
            </div>
        </div>
    </div>

    <!-- Scripts - Following existing codebase pattern -->
    <script src="../js/custom-cursor.js"></script>
    <script src="../js/use-scramble/vanilla-scramble.js"></script>
    <script type="module" src="../js/modules/musicPlayer.js"></script>
    <script type="module" src="../js/modules/playerIntegration.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/mobile-menu.js"></script>
    <script src="../js/mobile-tracklist.js"></script>
    <script type="module" src="./playground-main.js"></script>
</body>

</html>

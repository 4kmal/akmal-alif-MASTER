<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - Akmal Alif</title>
    <link rel="icon" href="../icon/ig.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/blog-styles.css">
    <script type="module" src="../js/analytics.js"></script>
    <script type="module" src="../js/speed-insights.js"></script>
    <script type="module" src="../js/profile-metrics.js"></script>
</head>
<body class="blog-page">
    <div id="animated-background-placeholder"></div>
    <div id="site-header-placeholder"></div>

    <div class="main-container blog-page-container">
        <div class="card blog-post-full">
            <header class="blog-post-header">
                <h1 data-blog-title>Loading Blog Post</h1>
                <p class="post-meta" data-blog-meta></p>
            </header>
            <hr class="post-separator">
            <div id="blog-outline-container" style="display: none;"></div>
            <article class="blog-content" data-blog-content></article>
            <nav class="post-navigation">
                <a href="/blogs">&larr; Back to Blog</a>
            </nav>
        </div>
    </div>

    <script src="../js/custom-cursor.js"></script>
    <script type="module" src="../js/modules/musicPlayer.js"></script>
    <script type="module" src="../js/modules/playerIntegration.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/mobile-menu.js"></script>
    <script type="module" src="../js/blog-post.js"></script>
</body>
</html>
